services:
  localstack:
    container_name: localstack_main
    image: localstack/localstack:3.8.1
    ports:
      - "0.0.0.0:4566:4566"
      - "0.0.0.0:4510-4559:4510-4559"
    environment:
      DEBUG: 1
      SERVICES: s3,sqs,dynamodb,iam
      PERSISTENCE: 1
      DATA_DIR: /tmp/localstack/data
      AWS_DEFAULT_REGION: us-east-1
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
    volumes:
      - localstack_data:/var/lib/localstack
      - "/var/run/docker.sock:/var/run/docker.sock"
    healthcheck:
      test: ["CMD", "bash", "-c", "awslocal health 2>/dev/null || curl -f http://localhost:4566/_localstack/health"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    networks:
      - pipeline-net

  bridge:
    container_name: bridge_app
    build:
      context: ./src/bridge_app
      dockerfile: Dockerfile
    depends_on:
      localstack:
        condition: service_healthy
    environment:
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_DEFAULT_REGION: us-east-1
      AWS_ENDPOINT_URL: http://localstack:4566
      SQS_QUEUE_URL: http://sqs.us-east-1.localhost.localstack.cloud:4566/000000000000/data-processing-queue
      GCP_PROJECT_ID: hybrid-pipeline-demo-2026
      GCP_PUBSUB_TOPIC: localstack-events
      GOOGLE_APPLICATION_CREDENTIALS: /app/keyfile.json
      DYNAMODB_TABLE_NAME: processed-records
    volumes:
      - "${PATH_TO_GCP_KEYFILE:-./keyfile.json}:/app/keyfile.json:ro"
    restart: unless-stopped
    networks:
      - pipeline-net

networks:
  pipeline-net:
    driver: bridge

volumes:
  localstack_data: